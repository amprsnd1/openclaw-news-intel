    gdelt_timeout_seconds: 15
    gdelt_max_retries: 2
    gdelt_retry_wait_seconds: 5
    enabled: true

  - name: Financial Times
    type: newspaper
    adapter: gdelt
    url: metadata-only
    language: en
    region: global
    country: UK
    country_code: uk
    domains: [ft.com]
    access_mode: metadata_only
    gdelt_timeout_seconds: 15
    gdelt_max_retries: 2
