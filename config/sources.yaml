gdelt:
  enabled: true
  max_queries_per_topic: 2
  max_items_per_query: 10
  timeout_seconds: 20
  retry_count: 1
  backoff_seconds: 30
  cache_ttl_minutes: 180
  min_delay_between_queries_seconds: 15
  stop_on_first_rate_limit: true
google_news_rss:
  enabled: true
  max_queries_per_topic: 3
  max_items_per_query: 20
  timeout_seconds: 15
  cache_ttl_minutes: 60
  user_agent: news-intel local research tool
source_quality:
  official_defense: high
  official_eu: high
  official_financial: high
  defense_specialist: high
  market_signals: high
  google_news_rss: medium
  european_local: medium
  fast_headlines: medium
  rss: medium
  gdelt: medium
  generic_rss: low
source_groups:
  fast_headlines:
    description: Broad fast headline discovery sources.
    sources:
    - rss
    - google_news_rss
  official_defense:
    description: Official defense, military, NATO, and ministry sources.
    sources:
    - nato
    - uk_mod
    - gov_pl_defense
    - bundeswehr
    - france_defense_ministry
    - estonia_defense
    - latvia_defense
    - lithuania_defense
    - finland_defense
    - sweden_defense
    - romania_defense
  official_eu:
    description: Official EU institutional and foreign/security policy sources.
    sources:
    - european_commission
    - european_council
    - eeas
    - european_defence_agency
    - european_parliament
  official_financial:
    description: Official macro, fiscal, rates, debt, and statistical sources.
    sources:
    - ecb
    - bank_of_england
    - uk_dmo
    - us_treasury
    - st_louis_fed
    - eurostat
    - imf
    - world_bank
    - european_commission_economy
  defense_specialist:
    description: Specialist defense and security media.
    sources:
    - defense_news
    - breaking_defense
    - defense_one
    - naval_news
    - the_war_zone
    - army_technology
    - air_and_space_forces
    - war_on_the_rocks
    - rusi
    - csis
    - atlantic_council
    - jamestown_foundation
  european_local:
    description: European local, national, and regional media useful for early signals.
    sources:
    - dw
    - france24
    - euractiv
    - euronews
    - kyiv_independent
    - notes_from_poland
    - tvp_world
    - yle
    - err_estonia
    - lsm_latvia
    - lrt_lithuania
    - balkan_insight
  market_signals:
    description: Market, macro, trade, commodities, and financial headline sources.
    sources:
    - investing_news
    - marketwatch
    - yahoo_finance
    - nasdaq_news
    - cme_group
    - ice
    - st_louis_fed
    - ecb
    - bank_of_england
    - us_treasury
    - uk_dmo
    - european_commission_economy
    - eurostat
    - imf
    - world_bank
official_source_roadmap:
- NATO public news and press feeds
- European Commission Press Corner RSS/API where available
- European Council public news feeds
- European Defence Agency public updates
- Selected national defense ministry RSS/API endpoints where stable
